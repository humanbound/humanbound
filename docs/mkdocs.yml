site_name: ""
site_url: https://docs.humanbound.ai
repo_url: https://github.com/humanbound/humanbound-cli

theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: slate
    primary: custom
    accent: orange
  font:
    text: DM Sans
    code: DM Mono
  logo: images/humanbound_logo.png
  favicon: images/favicon.ico
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - 🏠 Home: index.md
  - 🚀 Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
    - Agent Configuration: getting-started/agent-config.md
  - 🖥️ Local Engine:
    - Overview: local-engine/index.md
    - Provider Configuration: local-engine/provider-config.md
    - Scope Discovery: local-engine/scope-discovery.md
    - Orchestrators: local-engine/orchestrators.md
    - Output & Export: local-engine/output-formats.md
  - 🛡️ Defence:
    - Firewall: integrations/firewall.md
    - Guardrails: integrations/guardrails.md
  - 🔄 AISecOps:
    - Continuous Monitoring: concepts/campaigns.md
    - Findings: concepts/findings.md
    - Test Coverage: concepts/coverage.md
  - 💡 Concepts:
    - LLM-as-a-Judge: concepts/llm-as-judge.md
    - Security Posture: concepts/security-posture.md
  - 🧪 Testing:
    - Test Command: testing/test-command.md
    - Red Coworker [Preview]: testing/red-coworker.md
    - Log Upload: testing/log-upload.md
    - Assessments: testing/assessments.md
    - Reports: testing/reports.md
  - ⚙️ Management:
    - Projects: management/projects.md
    - Experiments: management/experiments.md
    - Model Providers: management/providers.md
    - API Keys: management/api-keys.md
    - Team Members: management/members.md
  - 🔌 Integrations:
    - Telemetry (Whitebox): integrations/telemetry.md
    - CI/CD: integrations/cicd.md
    - SIEM: integrations/siem.md
    - MCP Server: integrations/mcp.md
  - 📦 Deployment: deployment.md
  - 🔐 Authentication: authentication.md
  - 📖 Reference:
    - Commands: reference/commands.md
  - 🐚 Shell Completion: shell-completion.md
  - 🤝 Community: community.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html

extra_css:
  - stylesheets/extra.css
