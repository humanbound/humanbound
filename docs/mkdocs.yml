site_name: ""
site_url: https://docs.humanbound.ai
repo_url: https://github.com/humanbound/humanbound-cli

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: orange
  font:
    text: Inter
    code: JetBrains Mono
  logo: images/humanbound_logo.png
  favicon: images/humanbound_logo.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
    - Agent Configuration: getting-started/agent-config.md
  - Concepts:
    - LLM-as-a-Judge: concepts/llm-as-judge.md
    - Security Posture: concepts/security-posture.md
    - Findings: concepts/findings.md
    - Test Coverage: concepts/coverage.md
    - Campaigns (ASCAM): concepts/campaigns.md
  - Testing:
    - Test Command: testing/test-command.md
    - Log Upload: testing/log-upload.md
    - Assessments: testing/assessments.md
    - Reports: testing/reports.md
  - Management:
    - Projects: management/projects.md
    - Experiments: management/experiments.md
    - Model Providers: management/providers.md
    - API Keys: management/api-keys.md
    - Team Members: management/members.md
  - Integrations:
    - CI/CD: integrations/cicd.md
    - Guardrails: integrations/guardrails.md
    - Firewall: integrations/firewall.md
    - SIEM: integrations/siem.md
    - MCP Server: integrations/mcp.md
    - Shadow AI Discovery: integrations/discovery.md
  - Deployment: deployment.md
  - Authentication: authentication.md
  - Reference:
    - Commands: reference/commands.md
  - Shell Completion: shell-completion.md
  - Community: community.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

extra_css:
  - stylesheets/extra.css
