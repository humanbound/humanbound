site_name: Humanbound
site_url: https://docs.humanbound.ai
site_description: Humanbound documentation — AI security testing, continuous monitoring, and defense for LLM agents.
repo_url: https://github.com/humanbound/humanbound

plugins:
  - search
  - social:
      cards_layout_options:
        background_color: "#0a0a0a"
        color: "#ffffff"
        font_family: DM Sans
        logo: docs/images/social_logo.png

theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: slate
    primary: custom
    accent: orange
  font:
    text: DM Sans
    code: DM Mono
  logo: images/humanbound_logo.png
  favicon: images/favicon.ico
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - 🏠 Home: index.md
  - 🚀 Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
    - Agent Configuration: getting-started/agent-config.md
  - 🖥️ Local Engine:
    - Overview: local-engine/index.md
    - Provider Configuration: local-engine/provider-config.md
    - Scope Discovery: local-engine/scope-discovery.md
    - Orchestrators: local-engine/orchestrators.md
    - Output & Export: local-engine/output-formats.md
  - 💡 Concepts:
    - LLM-as-a-Judge: concepts/llm-as-judge.md
    - Red Coworker: concepts/red-coworker.md
    - Security Posture: concepts/security-posture.md
  - 🔬 Methodology:
    - Adversarial Engine: methodology/adversarial-engine.md
  - 🧪 Testing:
    - Test Command: testing/test-command.md
    - Collaborative Redteam [Preview]: testing/collaborative-redteam.md
    - Log Upload: testing/log-upload.md
    - Assessments: testing/assessments.md
    - Reports: testing/reports.md
  - 📋 Compliance:
    - Compliance Testing: compliance/index.md
  - 🛡️ Defense:
    - Firewall: defense/firewall.md
    - Guardrails: defense/guardrails.md
  - 🔄 AISecOps:
    - Continuous Monitoring: aisecops/continuous-monitoring.md
    - Findings: aisecops/findings.md
    - Test Coverage: aisecops/coverage.md
  - ⚙️ Management:
    - Projects: management/projects.md
    - Experiments: management/experiments.md
    - Model Providers: management/providers.md
    - API Keys: management/api-keys.md
    - Team & Collaboration: management/collaboration.md
  - 🔌 Integrations:
    - Telemetry (Whitebox): integrations/telemetry.md
    - CI/CD: integrations/cicd.md
    - SIEM: integrations/siem.md
    - MCP Server: integrations/mcp.md
  - 🧩 Plugins [Preview]:
    - Overview: plugins/index.md
  - 📦 Deployment: deployment.md
  - 🔐 Authentication: authentication.md
  - 📖 Reference:
    - Commands: reference/commands.md
    - Glossary: reference/glossary.md
  - 🐚 Shell Completion: shell-completion.md
  - 🤝 Community: community.md

markdown_extensions:
  - meta
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html

extra_css:
  - stylesheets/extra.css
