name: Release

on:
  push:
    tags:
      - "v*"

# No workflow-level permissions block: each job requests only what it needs
# (least privilege). Elevated scopes -- especially id-token: write, which can
# mint an OIDC token for Trusted Publishing -- are confined to the single job
# that uses them, so a compromised action/step in another job cannot reach them.

jobs:
  build-main:
    name: Build humanbound
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-main
          path: dist/

  publish-main:
    name: Publish humanbound to PyPI
    needs: build-main
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/humanbound/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist-main
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          attestations: true

  release:
    name: Create GitHub Release
    needs: [publish-main]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist-main
          path: dist/
      - name: Extract changelog entry for this tag
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          awk "/^## \[${VERSION}\]/{flag=1;print;next}/^## \[/{flag=0}flag" CHANGELOG.md > release_notes.md
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          body_path: release_notes.md
          files: |
            dist/*
          generate_release_notes: false
