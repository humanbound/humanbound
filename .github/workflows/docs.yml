name: Deploy docs
on:
  push:
    branches: [main]
    paths: ['docs/**']
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install mkdocs-material
      - run: cd docs && mkdocs gh-deploy --force
